<!DOCTYPE html>

<html lang="id">
<head>
    <style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        background:
            radial-gradient(circle at top left, #1f1f1f, #0d0d0d 60%);
        color:white;
        font-family:'Poppins', sans-serif;
        display:flex;
        flex-direction:column;
        align-items:center;
        min-height:100vh;
        padding:30px 20px;
    }

    h1{
        font-size:2.4rem;
        margin-bottom:10px;
        background:linear-gradient(90deg,#00ffe0,#00b3ff);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        text-shadow:0 0 20px rgba(0,255,224,0.2);
    }

    p{
        color:#cfcfcf;
        margin-bottom:25px;
        font-size:1rem;
        letter-spacing:1px;
    }

    .container{
        position:relative;
        width:640px;
        height:480px;
        border-radius:20px;
        overflow:hidden;
        border:1px solid rgba(255,255,255,0.1);
        background:#111;
        box-shadow:
            0 0 25px rgba(0,255,255,0.15),
            0 0 80px rgba(0,0,0,0.8);
        backdrop-filter:blur(10px);
    }

    video,
    canvas#overlay{
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:100%;
        object-fit:cover;
    }

    canvas#overlay{
        z-index:10;
        pointer-events:none;
    }

    #status{
        margin:20px 0;
        padding:14px 20px;
        border-radius:14px;
        background:rgba(255,255,255,0.05);
        border:1px solid rgba(255,255,255,0.08);
        width:640px;
        text-align:center;
        font-size:1rem;
        font-weight:600;
        letter-spacing:1px;
        color:#00ffae;
        box-shadow:0 0 15px rgba(0,255,174,0.08);
    }

    .btn-start{
        padding:14px 35px;
        margin-bottom:20px;
        font-size:1rem;
        cursor:pointer;
        background:linear-gradient(135deg,#00c6ff,#0072ff);
        color:white;
        border:none;
        border-radius:14px;
        font-weight:bold;
        transition:all 0.3s ease;
        box-shadow:
            0 10px 25px rgba(0,114,255,0.35);
    }

    .btn-start:hover{
        transform:translateY(-3px) scale(1.03);
        box-shadow:
            0 15px 35px rgba(0,114,255,0.5);
    }

    .btn-start:active{
        transform:scale(0.98);
    }

    /* Efek neon tipis */
    .container::before{
        content:'';
        position:absolute;
        inset:0;
        border-radius:20px;
        padding:2px;
        background:linear-gradient(
            135deg,
            rgba(0,255,255,0.7),
            rgba(0,114,255,0.2),
            rgba(255,255,255,0.1)
        );
        -webkit-mask:
            linear-gradient(#fff 0 0) content-box,
            linear-gradient(#fff 0 0);
        -webkit-mask-composite:xor;
        mask-composite:exclude;
        pointer-events:none;
        z-index:20;
    }

    @media(max-width:768px){

        .container,
        #status{
            width:100%;
            height:auto;
        }

        .container{
            aspect-ratio:4/3;
        }

        h1{
            font-size:1.8rem;
            text-align:center;
        }

        p{
            text-align:center;
        }
    }
</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deployment AI Siswa</title>
    
    <!-- Memuat mesin AI (ONNX Runtime Web) agar model bisa berjalan langsung di browser[cite: 2] -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    
    <style>
        body { background-color: #121212; color: white; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { position: relative; width: 640px; height: 480px; border: 2px solid #555; border-radius: 10px; overflow: hidden; }
        video, canvas#overlay { position: absolute; top: 0; left: 0; width: 640px; height: 480px; }
        canvas#overlay { z-index: 10; pointer-events: none; }
        #status { margin: 15px; padding: 10px; border-radius: 5px; background: #1e1e1e; border: 1px solid #444; width: 600px; text-align: center; }
        .btn-start { padding: 12px 30px; font-size: 1.1rem; cursor: pointer; background: #FF3B30; color: white; border: none; border-radius: 5px; font-weight: bold; }
        .btn-start:hover { background: #cc2f26; }
    </style>
</head>
<body>

    <!-- GANTI BAGIAN INI dengan judul proyek kalian -->
    <h1>🛡️ Proyek AI: Deteksi Otomatis</h1>
    <p>Dibuat oleh: [ikmal, rifa, revan]</p>
    
    <button id="btn-init" class="btn-start">AKTIFKAN KAMERA</button>
    <div id="status">STATUS: MATI</div>

    <div class="container">
        <!-- Elemen video untuk menampilkan gambar langsung dari kamera laptop/HP[cite: 2] -->
        <video id="webcam" playsinline muted></video>
        <!-- Kanvas transparan untuk menggambar kotak deteksi di atas video kamera[cite: 2] -->
        <canvas id="overlay" width="640" height="480"></canvas>
    </div>

    <!-- Kanvas tersembunyi yang digunakan sistem untuk menyesuaikan ukuran gambar bagi AI (Jangan dihapus!)[cite: 2] -->
    <canvas id="processor" width="640" height="640" style="display:none;"></canvas>

    <!-- Memanggil file logika AI kalian -->
    <script src="app.js"></script>
</body>
</html>
